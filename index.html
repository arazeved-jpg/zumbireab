<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZumbiReab — Reabilitação de Zumbido</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F9FAFB; }
    input[type=range] { width: 100%; accent-color: #3B82F6; cursor: pointer; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    select, input, textarea { outline: none; }
    select:focus, input:focus, textarea:focus { border-color: #3B82F6 !important; box-shadow: 0 0 0 3px #DBEAFE; }
    button { transition: opacity .15s, transform .1s; }
    button:hover:not(:disabled) { opacity: .88; }
    button:active:not(:disabled) { transform: scale(.98); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
    
    /* Login Styles */
    .login-container { max-width: 420px; margin: 60px auto; padding: 32px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 28px; font-weight: 800; color: #1F2937; margin-bottom: 8px; }
    .login-header p { color: #6B7280; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; font-size: 14px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { border-color: #3B82F6; }
    .btn-login { width: 100%; padding: 12px; background: #3B82F6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .btn-login:hover { opacity: 0.9; }
    .btn-signup { width: 100%; padding: 12px; background: white; color: #3B82F6; border: 2px solid #3B82F6; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-signup:hover { background: #EFF6FF; }
    .login-error { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .login-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: #6B7280; }
    .login-toggle button { background: none; border: none; color: #3B82F6; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useContext, createContext } = React;
const ApiKeyContext = createContext("");

// ================================================================
// FIREBASE CONFIG - VOCÊ PREENCHERÁ ISSO DEPOIS
// ================================================================
let firebaseApp = null;
const initFirebase = (config) => {
  if (!firebaseApp) {
    firebaseApp = firebase.initializeApp(config);
  }
};

// ================================================================
// AUTH CONTEXT
// ================================================================
const AuthContext = createContext();
function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  
  useEffect(() => {
    if (!firebaseApp) return;
    const unsubscribe = firebase.auth().onAuthStateChanged(u => {
      setUser(u);
      setLoading(false);
    });
    return unsubscribe;
  }, []);
  
  const login = async (email, password) => {
    return firebase.auth().signInWithEmailAndPassword(email, password);
  };
  
  const signup = async (email, password) => {
    return firebase.auth().createUserWithEmailAndPassword(email, password);
  };
  
  const logout = async () => {
    return firebase.auth().signOut();
  };
  
  return (
    <AuthContext.Provider value={{ user, loading, login, signup, logout }}>
      {children}
    </AuthContext.Provider>
  );
}

function useAuth() {
  return useContext(AuthContext);
}

// ================================================================
// LOGIN SCREEN
// ================================================================
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [isSignup, setIsSignup] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const { login, signup } = useAuth();
  
  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    
    try {
      if (isSignup) {
        await signup(email, password);
      } else {
        await login(email, password);
      }
    } catch (err) {
      if (err.code === "auth/email-already-in-use") {
        setError("Este email já está registrado. Tente fazer login.");
      } else if (err.code === "auth/user-not-found") {
        setError("Email não encontrado. Crie uma nova conta.");
      } else if (err.code === "auth/wrong-password") {
        setError("Senha incorreta.");
      } else if (err.code === "auth/weak-password") {
        setError("Senha muito fraca (mínimo 6 caracteres).");
      } else {
        setError(err.message || "Erro ao autenticar");
      }
    }
    setLoading(false);
  };
  
  return (
    <div className="login-container">
      <div className="login-header">
        <h1>👂 ZumbiReab</h1>
        <p>{isSignup ? "Criar nova conta" : "Fazer login"}</p>
      </div>
      
      {error && <div className="login-error">{error}</div>}
      
      <form onSubmit={handleSubmit}>
        <div className="form-group">
          <label>Email</label>
          <input
            type="email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
            placeholder="seu@email.com"
            required
            disabled={loading}
          />
        </div>
        
        <div className="form-group">
          <label>Senha</label>
          <input
            type="password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            placeholder="••••••••"
            required
            disabled={loading}
          />
        </div>
        
        <button
          type="submit"
          className="btn-login"
          disabled={loading}
        >
          {loading ? "Carregando..." : (isSignup ? "Criar Conta" : "Entrar")}
        </button>
      </form>
      
      <div className="login-toggle">
        {isSignup ? (
          <>
            Já tem conta?{' '}
            <button onClick={() => setIsSignup(false)}>Fazer login</button>
          </>
        ) : (
          <>
            Não tem conta?{' '}
            <button onClick={() => setIsSignup(true)}>Criar agora</button>
          </>
        )}
      </div>
    </div>
  );
}

// ================================================================
// AUDIO ENGINE
// ================================================================
function useAudioEngine() {
  const ctxRef = useRef(null);
  const nodesRef = useRef({});
  const getCtx = () => {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  };
  const stop = useCallback(() => {
    Object.values(nodesRef.current).forEach(n => { try { n.stop && n.stop(); } catch(_){} try { n.disconnect && n.disconnect(); } catch(_){} });
    nodesRef.current = {};
  }, []);
  const play = useCallback((cfg) => {
    stop();
    const ctx = getCtx();
    if (ctx.state === "suspended") ctx.resume();
    const master = ctx.createGain();
    master.gain.value = cfg.volume != null ? cfg.volume : 0.25;
    master.connect(ctx.destination);
    nodesRef.current.master = master;
    const makeNoise = type => {
      const sr = ctx.sampleRate, buf = ctx.createBuffer(2, sr*2, sr);
      for (let ch=0;ch<2;ch++) {
        const d = buf.getChannelData(ch);
        if (type==="white") { for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
        else if (type==="pink") { let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; for(let i=0;i<d.length;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)/8;b6=w*0.115926;} }
        else { let last=0; for(let i=0;i<d.length;i++){const w=Math.random()*2-1;d[i]=(last+0.02*w)/1.02;last=d[i];d[i]*=3.5;} }
      }
      const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true; return src;
    };
    switch(cfg.type) {
      case "white_noise": case "pink_noise": case "brown_noise": {
        const src = makeNoise(cfg.type.split("_")[0]);
        let out = src;
        if (cfg.notchFreq) { const n=ctx.createBiquadFilter(); n.type="notch"; n.frequency.value=cfg.notchFreq; n.Q.value=12; src.connect(n); out=n; }
        out.connect(master); src.start(); nodesRef.current.src=src; break;
      }
      case "pure_tone": { const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=cfg.frequency||1000; o.connect(master); o.start(); nodesRef.current.osc=o; break; }
      case "modulated": { const o=ctx.createOscillator(),lfo=ctx.createOscillator(),lG=ctx.createGain(); o.type="sine"; o.frequency.value=cfg.frequency||440; lfo.frequency.value=0.2; lG.gain.value=(cfg.frequency||440)*0.25; lfo.connect(lG); lG.connect(o.frequency); o.connect(master); o.start(); lfo.start(); nodesRef.current.osc=o; nodesRef.current.lfo=lfo; break; }
      case "fractal": { const base=cfg.frequency||220; [1,1.5,2,2.67,3.5].forEach((r,i)=>{const o=ctx.createOscillator(),g=ctx.createGain(),lfo=ctx.createOscillator(),lG=ctx.createGain(); o.frequency.value=base*r; o.type="sine"; g.gain.value=0.12/(i+1); lfo.frequency.value=0.04+i*0.025; lG.gain.value=base*r*0.04; lfo.connect(lG); lG.connect(o.frequency); o.connect(g); g.connect(master); o.start(); lfo.start(); nodesRef.current["o"+i]=o; nodesRef.current["l"+i]=lfo;}); break; }
    }
  }, [stop]);
  const setVolume = useCallback(v => { if(nodesRef.current.master) nodesRef.current.master.gain.value=v; }, []);
  useEffect(() => () => stop(), []);
  return { play, stop, setVolume };
}

function HomeScreen({ onSelect }) {
  return (
    <div style={{ maxWidth:440, margin:"0 auto", textAlign:"center", paddingTop:40 }}>
      <div style={{ fontSize:64, marginBottom:8 }}>👂</div>
      <h1 style={{ fontSize:28, fontWeight:800, color:"#1F2937", marginBottom:6 }}>ZumbiReab</h1>
      <p style={{ color:"#6B7280", marginBottom:36, fontSize:15, lineHeight:1.6 }}>
        Plataforma de reabilitação para zumbido,<br/>hiperacusia e distúrbios do sono auditivo.
      </p>
      <div style={{ display:"grid", gap:12, marginBottom:24 }}>
        <button onClick={()=>onSelect("professional")} style={{ padding:"20px 24px", borderRadius:16, border:"2px solid #BFDBFE", background:"#EFF6FF", cursor:"pointer", textAlign:"left" }}>
          <div style={{ fontSize:22, marginBottom:6 }}>🩺</div>
          <div style={{ fontWeight:700, fontSize:16, color:"#1E40AF", marginBottom:4 }}>Área do Profissional</div>
          <div style={{ fontSize:13, color:"#3B82F6", lineHeight:1.4 }}>Inserir anamnese, audiometria e acufenometria.</div>
        </button>
        <button onClick={()=>onSelect("patient")} style={{ padding:"20px 24px", borderRadius:16, border:"2px solid #BBF7D0", background:"#F0FDF4", cursor:"pointer", textAlign:"left" }}>
          <div style={{ fontSize:22, marginBottom:6 }}>🧑‍⚕️</div>
          <div style={{ fontWeight:700, fontSize:16, color:"#15803D", marginBottom:4 }}>Área do Paciente</div>
          <div style={{ fontSize:13, color:"#16A34A", lineHeight:1.4 }}>Terapia sonora, exercícios guiados, protocolo do sono e progresso.</div>
        </button>
      </div>
    </div>
  );
}

function SimpleArea({ title }) {
  return (
    <div style={{ maxWidth:500, margin:"0 auto" }}>
      <h2 style={{ fontSize:24, fontWeight:700, marginBottom:20, color:"#1F2937" }}>{title}</h2>
      <p style={{ color:"#6B7280", marginBottom:20 }}>Área em desenvolvimento. Aqui virão os recursos completos.</p>
    </div>
  );
}

function App() {
  const { user, loading } = useAuth();
  const [screen, setScreen] = useState("home");
  
  if (loading) {
    return <div style={{ padding:"40px", textAlign:"center", color:"#6B7280" }}>Carregando...</div>;
  }
  
  if (!user) {
    return <LoginScreen />;
  }
  
  return (
    <div style={{ fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", background:"#F9FAFB", minHeight:"100vh" }}>
      <div style={{ background:"#fff", borderBottom:"1px solid #E5E7EB", padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10, boxShadow:"0 1px 3px rgba(0,0,0,.05)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:20 }}>👂</span>
          <span style={{ fontWeight:800, fontSize:16, color:"#1F2937" }}>ZumbiReab</span>
          {screen !== "home" && <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:"#F3F4F6", color:"#6B7280" }}>{screen==="professional"?"Profissional":"Paciente"}</span>}
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {screen !== "home" && (
            <button onClick={()=>setScreen("home")} style={{ padding:"6px 12px", borderRadius:8, border:"1px solid #E5E7EB", background:"#fff", fontSize:12, cursor:"pointer", color:"#6B7280" }}>
              ← Início
            </button>
          )}
          <LogoutButton />
        </div>
      </div>
      <div style={{ padding:"20px 16px 80px" }}>
        {screen === "home" && <HomeScreen onSelect={setScreen} />}
        {screen === "professional" && <SimpleArea title="Área do Profissional" />}
        {screen === "patient" && <SimpleArea title="Área do Paciente" />}
      </div>
    </div>
  );
}

function LogoutButton() {
  const { logout } = useAuth();
  return (
    <button
      onClick={logout}
      style={{ padding:"6px 12px", borderRadius:8, border:"1px solid #FCA5A5", background:"#FEE2E2", fontSize:12, cursor:"pointer", color:"#DC2626" }}
    >
      Sair
    </button>
  );
}

    };
    
    if (firebaseConfig.apiKey !== "SEU_API_KEY") {
      initFirebase(firebaseConfig);
    }
  }, []);
  
  const [firebaseReady, setFirebaseReady] = useState(false);
  
  useEffect(() => {
    const checkFirebase = setInterval(() => {
      if (window.firebase && window.firebase.auth) {
        setFirebaseReady(true);
        clearInterval(checkFirebase);
      }
    }, 100);

  }, []);
  
  if (!firebaseReady) {
    return <div style={{ padding:"40px", textAlign:"center", color:"#999" }}>Inicializando Firebase...</div>;

  return (
    <AuthProvider>
      <App />
